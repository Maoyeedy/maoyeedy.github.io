<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global</title>
    <link rel="icon" href="img/favicon/favicon.webp">
    <link rel="stylesheet" href="/css/global.css">
    <script defer src="/js/global.js"></script>

    <style>
        body {
            font-family: 'Barlow', sans-serif;
            background-image: url(/img/placeholderBG/5.avif);
            margin: 2em;
        }

        .container-thin {
            max-width: 550px;
            display: grid;
            align-items: center;
            margin: auto;
            gap: 1rem;

            padding: 2rem;
            border-radius: 2rem;

            backdrop-filter: blur(8px);
            box-shadow: 0 0.25rem 1.5rem rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.3);

            background: hsl(0 80% 50% / 0.25);
            background: #00000033;
            background: #ffffff33;
        }

        .container-thin>img {
            border-radius: 1rem;
        }
    </style>
</head>

<body>
    <div class="container-thin">
        <div>
            <h1>The Heading</h1>
            <h3>And the Subheading</h3>
            <p>Filler text is text that shares some characteristics of a real written text, but is random or otherwise
                generated. It may be used to display a sample of fonts, generate text for testing, or to spoof an e-mail
                spam filter.</p>
        </div>
        <img src="/img/placeholder/1.avif" alt="">
        <img src="/img/placeholder/2.avif" alt="">
        <img src="/img/placeholder/3.avif" alt="">
        <img src="/img/placeholder/4.avif" alt="">
    </div>
</body>

</html>
