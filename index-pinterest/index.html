<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest</title>
    <link rel="icon" href="img/favicon/favicon.webp">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/pinterest.css">
    <script defer src="/js/global.js"></script>
    <script defer src="/js/fullscreen.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Barlow', sans-serif;
        }
    </style>
</head>

<body>
    <div class="container-image fullscreenable">
        <div class="image-grid">
            <img src="/img/placeholder/1.avif">
            <img src="/img/placeholder/2.avif">
        </div>
        <div class="pinterest">
            <div class="column">
                <img src="/img/pinterest/1.avif">
                <img src="/img/pinterest/5.avif">
                <img src="/img/pinterest/9.avif">
            </div>
            <div class="column">
                <img src="/img/pinterest/4.avif">
                <img src="/img/pinterest/8.avif">
                <img src="/img/pinterest/12.avif">
            </div>
            <div class="column">
                <img src="/img/pinterest/2.avif">
                <img src="/img/pinterest/6.avif">
                <img src="/img/pinterest/10.avif">
            </div>
            <div class="column">
                <img src="/img/pinterest/3.avif">
                <img src="/img/pinterest/7.avif">
                <img src="/img/pinterest/11.avif">
            </div>
        </div>
    </div>

</body>

</html>
