<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毛一迪-灯光设计思路</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0B0109;
        }

        .image-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .image-container img {
            margin: 0;
            padding: 0;
        }

        @media only screen and (orientation: landscape) {
            .image-container img {
                width: 75vw;
            }
        }

        @media only screen and (orientation: portrait) {
            .image-container img {
                width: 100vw;
            }
        }
    </style>
</head>

<body>
    <div class="image-container">
        <img src="1.webp">
        <img src="2.webp">
        <img src="3.webp">
        <img src="4.webp">
        <img src="5.webp">
        <img src="6.webp">
        <img src="7.webp">
        <img src="8.webp">
        <img src="9.webp">
        <img src="10.webp">
        <img src="11.webp">
        <img src="12.webp">
        <img src="13.webp">
    </div>
</body>

</html>
